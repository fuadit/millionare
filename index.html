<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستهدف المليون</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- خط القاهرة بجودة عالية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --accent: #10b981;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --dot-empty: #334155;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--card-bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            
            /* إجبار الأرقام القياسية العربية */
            font-variant-numeric: lining-nums;
            -webkit-font-feature-settings: "lnum";
            font-feature-settings: "lnum";
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            padding: 30px 25px;
            border-radius: 16px;
            text-align: center;
            box-sizing: border-box;
        }

        /* صندوق العبارات الإسلامية */
        .quote-box {
            background: #111827;
            padding: 12px 15px;
            border-radius: 8px;
            border-right: 4px solid var(--accent);
            font-size: 0.9rem;
            color: #e2e8f0;
            margin-bottom: 25px;
            text-align: right;
            line-height: 1.6;
        }

        .target-header {
            margin-bottom: 20px;
        }

        .target-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .target-value {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent);
            margin-top: 2px;
        }

        .progress-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .amount-display {
            font-size: 2.6rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
            text-align: right;
        }

        .amount-display span {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            margin-top: 5px;
        }

        .percentage-badge {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-main);
            background: #111827;
            padding: 6px 12px;
            border-radius: 8px;
            line-height: 1.2;
        }

        /* شبكة الـ 500 دائرة مكثفة للمتابعة الدقيقة */
        .dots-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr); /* 20 عمود بدلاً من 10 */
            gap: 4px;
            background: #111827;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .dot {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--dot-empty);
            border-radius: 50%;
        }

        .dot.active {
            background-color: var(--accent);
        }

        /* أدوات الإدخال */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            flex: 1;
            padding: 14px;
            border: 2px solid #475569;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            background: #111827;
            color: var(--text-main);
            outline: none;
            text-align: center;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

        button {
            font-family: 'Cairo', sans-serif;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-add {
            background-color: var(--primary);
            color: white;
            padding: 0 30px;
        }

        .btn-add:active {
            background-color: #2563eb;
        }

        .btn-reset {
            background: transparent;
            color: #ef4444;
            font-size: 0.85rem;
            opacity: 0.5;
        }

        .btn-reset:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="quote-box" id="quoteBox">💡 جاري استحضار النية...</div>

    <div class="target-header">
        <div class="target-label">الهدف المالي المستهدف</div>
        <div class="target-value">1,000,000 ل.س</div>
    </div>
    
    <div class="progress-hero">
        <div class="amount-display" id="currentAmount">0
            <span>ليرة سورية مجموعة</span>
        </div>
        <div class="percentage-badge" id="progressPercent">0.0%</div>
    </div>

    <!-- شبكة الدوائر المكثفة (500 دائرة) -->
    <div class="dots-grid" id="dotsGrid"></div>

    <div class="input-group">
        <input type="number" id="amountInput" placeholder="أدخل المبلغ المضاف..." min="1">
        <button class="btn-add" onclick="addAmount()">إضافة</button>
    </div>

    <button class="btn-reset" onclick="resetAmount()">إعادة تعيين العداد</button>
</div>

<script>
    const TARGET = 1000000;
    const TOTAL_DOTS = 500; // تم زيادة عدد الدوائر لتقدم أدق
    let currentSaved = parseFloat(localStorage.getItem('savedAmount')) || 0;

    const islamicQuotes = [
        "«وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ» - تذكّر أن السعي عليك والبركة من الله.",
        "«مَا نَقَصَتْ مَالُ عَبْدٍ مِنْ صَدَقَةٍ» - اجعل لِهدفِك نصيباً من البركة ليربو وينمو.",
        "«احْرِصْ عَلَى مَا يَنْفَعُكَ وَاسْتَعِنْ بِاللَّهِ» - خطوة بخطوة يقترب المستحيل.",
        "«إِنَّ اللَّهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ» - الاستمرار والإنضباط أساس الإتقان.",
        "قليلٌ دائم خيرٌ من كثيرٍ منقطع.. تابع مسيرك وثق بفضل الله.",
        "إنما يُنال الرزق بالسعي؛ تذكر نيتك الطيبة في تأمين هذا المبلغ وتوكل على الرزاق.",
        "«وَفِي السَّمَاءِ رِزْقُكُمْ وَمَا تُوعَدُونَ» - اعمل بالأسباب واطمئن لتدبير الله.",
        "من سار على الدرب بالاستعانة بالله وصل، المليون يبدأ بليرة."
    ];

    function displayRandomQuote() {
        const randomIndex = Math.floor(Math.random() * islamicQuotes.length);
        document.getElementById('quoteBox').innerText = islamicQuotes[randomIndex];
    }

    // توليد 500 دائرة صغيرة ديناميكياً
    const dotsGrid = document.getElementById('dotsGrid');
    for (let i = 0; i < TOTAL_DOTS; i++) {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        dotsGrid.appendChild(dot);
    }

    displayRandomQuote();
    updateUI();

    function updateUI() {
        document.getElementById('currentAmount').innerHTML = currentSaved.toLocaleString('en-US') + " <span>ليرة سورية مجموعة</span>";
        
        // حساب النسبة المئوية بدقة منزلة عشرية واحدة لتظهر الأجزاء من 1%
        let percent = (currentSaved / TARGET) * 100;
        if (percent > 100) percent = 100;
        
        document.getElementById('progressPercent').innerText = percent.toFixed(1) + '%';
        
        // حساب عدد الدوائر المضاءة بناءً على النسبة من الـ 500 دائرة
        let dotsToActivate = Math.floor((percent / 100) * TOTAL_DOTS);
        
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, index) => {
            if (index < dotsToActivate) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
        
        localStorage.setItem('savedAmount', currentSaved);
    }

    function addAmount() {
        const input = document.getElementById('amountInput');
        const value = parseFloat(input.value);

        if (!isNaN(value) && value > 0) {
            currentSaved += value;
            updateUI();
            input.value = '';
            input.focus();
        }
    }

    function resetAmount() {
        if (confirm('هل أنت متأكد من تصفير العداد والبدء من جديد؟')) {
            currentSaved = 0;
            updateUI();
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>

</body>
</html>
